<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- iPhone Home Screen PWA Capable Details -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Sky" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Theme & Android Styling -->
    <meta name="theme-color" content="#07111f" />
    
    <!-- Browser Tab Title -->
    <title>Break the Sky</title>
    
    <!-- Manifest with relative path for sub-directory hosting on GitHub Pages -->
    <link rel="manifest" href="manifest.json" />
    
    <!-- Apple Touch Icon & Standard Web Icons -->
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
    
    <!-- Metadata Definitions -->
    <meta name="description" content="A cinematic mobile flight simulator with aircraft selection, missions and landing challenges." />
    
    <!-- Open Graph Social Verification tags -->
    <meta property="og:title" content="Break the Sky" />
    <meta property="og:description" content="A cinematic mobile flight simulator with aircraft selection, missions and landing challenges." />
    <meta property="og:type" content="website" />
  </head>
  <body style="background-color: #07111f; margin: 0; padding: 0; -webkit-user-select: none; user-select: none;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Register sw.js relative to the base directory (perfect for sub-directories)
          const swPath = './sw.js';
          navigator.serviceWorker.register(swPath)
            .then((reg) => console.log('Service Worker registered successfully:', reg.scope))
            .catch((err) => console.warn('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
